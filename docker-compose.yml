version: '3.8'

services:
  easyllm:
    build: .
    container_name: easyllm
    ports:
      - "8080:8080"
    volumes:
      - easyllm_data:/app/data
    environment:
      - SERVER_PORT=8080
      - DB_TYPE=sqlite
      - DB_SQLITE_PATH=/app/data/easyllm.db
      - DATA_DIR=/app/data
      # Optional: HTTP Proxy
      # - PROXY_ENABLED=true
      # - PROXY_HOST=host.docker.internal
      # - PROXY_PORT=7890
      # Optional: PostgreSQL (instead of SQLite)
      # - DB_TYPE=postgres
      # - DB_DSN=host=postgres user=easyllm password=easyllm dbname=easyllm port=5432 sslmode=disable
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: PostgreSQL database
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: easyllm-postgres
  #   environment:
  #     POSTGRES_DB: easyllm
  #     POSTGRES_USER: easyllm
  #     POSTGRES_PASSWORD: easyllm
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   restart: unless-stopped

volumes:
  easyllm_data:
    driver: local
  # postgres_data:
  #   driver: local
