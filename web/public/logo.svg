<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#2563EB"/>
  <!-- Inner subtle gradient overlay -->
  <rect width="64" height="64" rx="14" fill="url(#grad)" opacity="0.35"/>
  <!-- Circuit/neural dot grid -->
  <circle cx="14" cy="14" r="2" fill="white" opacity="0.25"/>
  <circle cx="32" cy="14" r="2" fill="white" opacity="0.25"/>
  <circle cx="50" cy="14" r="2" fill="white" opacity="0.25"/>
  <circle cx="14" cy="50" r="2" fill="white" opacity="0.25"/>
  <circle cx="50" cy="50" r="2" fill="white" opacity="0.25"/>
  <!-- "EL" lettering -->
  <text
    x="32" y="42"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="26"
    font-weight="800"
    fill="white"
    text-anchor="middle"
    letter-spacing="-1"
  >EL</text>
  <!-- Bottom accent line -->
  <rect x="20" y="48" width="24" height="3" rx="1.5" fill="white" opacity="0.4"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
  </defs>
</svg>
